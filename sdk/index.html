<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Remote Input Demo</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>Remote Input</h1>
      <div class="toolbar">
        <button id="connectButton" type="button">BLE 连接</button>
        <input id="wsUrlInput" type="url" value="ws://192.168.4.1/ws" aria-label="WebSocket URL">
        <button id="connectWsButton" type="button">WS 连接</button>
        <button id="disconnectButton" type="button" disabled>断开</button>
        <button id="statusButton" type="button" disabled>状态</button>
      </div>
      <p class="hint">目标设备应通过 Vite dev server 或部署后的 Vite 页面打开 <a href="./decode.html" target="_blank" rel="noreferrer">decode.html</a>；不要直接以 file:// 或原始静态源文件方式打开当前 HTML。发送前请切换目标设备到 US/English 键盘布局，关闭 Caps Lock，并关闭会拦截 ASCII 标点的输入法组合状态，然后把光标放在 RIB32 输入框中。</p>
      <textarea id="textInput" rows="8" maxlength="131072" placeholder="输入要发送到目标设备的文本"></textarea>
      <button id="typeButton" type="button" disabled>发送并等待输入完成</button>
      <pre id="statusOutput">未连接</pre>
    </section>
  </main>
  <script type="module">
    import * as RemoteInput from "./src/index.ts";

    let device = null;
    const statusOutput = document.querySelector("#statusOutput");
    const connectButton = document.querySelector("#connectButton");
    const connectWsButton = document.querySelector("#connectWsButton");
    const wsUrlInput = document.querySelector("#wsUrlInput");
    const disconnectButton = document.querySelector("#disconnectButton");
    const statusButton = document.querySelector("#statusButton");
    const typeButton = document.querySelector("#typeButton");
    const textInput = document.querySelector("#textInput");

    function setConnected(value) {
      connectButton.disabled = value;
      connectWsButton.disabled = value;
      wsUrlInput.disabled = value;
      disconnectButton.disabled = !value;
      statusButton.disabled = !value;
      typeButton.disabled = !value;
    }

    function formatError(error) {
      return `${error.code || "ERROR"}: ${error.message}`;
    }

    connectButton.addEventListener("click", async () => {
      try {
        device = await RemoteInput.connect();
        setConnected(true);
        statusOutput.textContent = "BLE 已连接";
      } catch (error) {
        statusOutput.textContent = formatError(error);
      }
    });

    connectWsButton.addEventListener("click", async () => {
      try {
        device = await RemoteInput.connectWs(wsUrlInput.value.trim() || undefined);
        setConnected(true);
        statusOutput.textContent = "WebSocket 已连接";
      } catch (error) {
        statusOutput.textContent = formatError(error);
      }
    });

    disconnectButton.addEventListener("click", async () => {
      try {
        if (device) await device.disconnect();
        statusOutput.textContent = "已断开";
      } catch (error) {
        statusOutput.textContent = formatError(error);
      } finally {
        device = null;
        setConnected(false);
      }
    });

    statusButton.addEventListener("click", async () => {
      try {
        const status = await device.getStatus();
        statusOutput.textContent = JSON.stringify(status, null, 2);
      } catch (error) {
        statusOutput.textContent = formatError(error);
        if (!device || !device.connected) setConnected(false);
      }
    });

    typeButton.addEventListener("click", async () => {
      try {
        typeButton.disabled = true;
        await device.typeText(textInput.value);
        statusOutput.textContent = "输入完成";
      } catch (error) {
        statusOutput.textContent = formatError(error);
      } finally {
        typeButton.disabled = !device || !device.connected;
      }
    });
  </script>
</body>
</html>
