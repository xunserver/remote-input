<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Remote Input Decoder</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app app--decoder">
    <section class="panel decoder-panel">
      <header class="decoder-header">
        <h1>Remote Input Decoder</h1>
        <button id="clearButton" type="button">清空</button>
      </header>
      <p class="hint">请通过 Vite dev server 或部署后的 Vite 页面访问此页；不要直接以 file:// 或原始静态源文件方式打开当前 HTML。目标设备切换到 US/English 键盘布局，并关闭会拦截 ASCII 标点的输入法组合状态。把光标保持在输入框内，等待 ESP32-S3 输入 RIB32 文本帧。完整校验通过后再复制中文结果。</p>
      <textarea id="rib32Input" rows="10" spellcheck="false" autocomplete="off" autocapitalize="off" placeholder="<RIB32:1:...>"></textarea>
      <section id="lineErrorList" class="task-list" aria-live="polite"></section>
      <section id="taskList" class="task-list" aria-live="polite"></section>
    </section>
  </main>
  <script type="module">
    import { createRib32DecoderState, getRib32LineErrors, getRib32Tasks, ingestRib32Text } from "./src/base32Frame.ts";

    const input = document.querySelector("#rib32Input");
    const lineErrorList = document.querySelector("#lineErrorList");
    const taskList = document.querySelector("#taskList");
    const clearButton = document.querySelector("#clearButton");
    let state = createRib32DecoderState();
    let processedLength = 0;

    function render() {
      const tasks = getRib32Tasks(state);
      const lineErrors = getRib32LineErrors(state);
      lineErrorList.replaceChildren();
      taskList.replaceChildren();

      if (lineErrors.length > 0) {
        const article = document.createElement("article");
        article.className = "task-card task-card--error";

        const title = document.createElement("h2");
        title.textContent = "全局解析错误";
        article.append(title);

        const errors = document.createElement("pre");
        errors.textContent = lineErrors.join("\n");
        article.append(errors);
        lineErrorList.append(article);
      }

      if (tasks.length === 0) {
        const empty = document.createElement("p");
        empty.className = "hint";
        empty.textContent = lineErrors.length > 0 ? "存在未归属到 task 的输入错误" : "等待输入";
        taskList.append(empty);
        return;
      }

      for (const task of tasks) {
        const article = document.createElement("article");
        article.className = `task-card task-card--${task.status}`;

        const title = document.createElement("h2");
        title.textContent = `Task ${task.taskId} - ${task.status}`;
        article.append(title);

        const progress = document.createElement("p");
        progress.className = "hint";
        progress.textContent = `Chunks ${task.receivedValidChunks}/${task.chunkTotal ?? "?"}`;
        article.append(progress);

        if (task.errors.length > 0) {
          const errors = document.createElement("pre");
          errors.textContent = task.errors.join("\n");
          article.append(errors);
        }

        if (task.status === "complete" && task.decodedText !== undefined) {
          const output = document.createElement("textarea");
          output.rows = 6;
          output.readOnly = true;
          output.value = task.decodedText;
          article.append(output);

          const copy = document.createElement("button");
          copy.type = "button";
          copy.textContent = "复制";
          copy.addEventListener("click", async () => {
            try {
              await navigator.clipboard.writeText(task.decodedText ?? "");
              copy.textContent = "已复制";
              setTimeout(() => {
                copy.textContent = "复制";
              }, 1200);
            } catch {
              copy.textContent = "复制失败";
              setTimeout(() => {
                copy.textContent = "复制";
              }, 1200);
            }
          });
          article.append(copy);
        }

        taskList.append(article);
      }
    }

    input.addEventListener("input", () => {
      const newText = input.value.slice(processedLength);
      ingestRib32Text(state, newText);
      input.value = state.buffer;
      processedLength = input.value.length;
      render();
    });

    clearButton.addEventListener("click", () => {
      state = createRib32DecoderState();
      input.value = "";
      processedLength = 0;
      render();
      input.focus();
    });

    render();
    input.focus();
  </script>
</body>
</html>
